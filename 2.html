<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件去重分析仪 (支持MT管理器定位)</title>
    <style>
        :root {
            --bg-color: #F5F5F7;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-secondary: #86868B;
            --accent-color: #007AFF;
            --border-radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        /* 隐藏原生 input，使用自定义按钮 */
        input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .upload-btn:active {
            opacity: 0.7;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar-bg {
            background-color: #E5E5EA;
            border-radius: 8px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        .results {
            display: none;
        }

        .duplicate-group {
            background-color: #FBFBFD;
            border: 1px solid #E5E5EA;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .duplicate-group h3 {
            font-size: 15px;
            color: #FF3B30; /* 红色高亮重复项 */
            margin-bottom: 12px;
            border-bottom: 1px solid #E5E5EA;
            padding-bottom: 8px;
        }

        .file-item {
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 10px;
            word-break: break-all;
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #f0f0f2;
        }

        .file-info {
            display: flex;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .file-info::before {
            content: "📄";
            margin-right: 8px;
        }

        /* 新增的 MT 管理器辅助定位工具栏 */
        .action-bar {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            padding-left: 22px;
        }

        .action-link {
            font-size: 12px;
            color: var(--accent-color);
            background-color: #E8F2FF;
            padding: 4px 8px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .action-link:active {
            opacity: 0.6;
        }
        
        /* 提示小弹窗 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>文件去重分析仪</h1>
        <p>精准识别内容重复的文件</p>
    </div>

    <div class="card">
        <input type="file" id="fileInput" webkitdirectory directory multiple>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
            选择文件夹 / 文件
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">准备处理...</div>
        </div>
    </div>

    <div class="card results" id="resultsArea">
        <h2 style="font-size: 18px; margin-bottom: 16px;">分析结果</h2>
        <div id="duplicateList"></div>
    </div>
</div>

<div class="toast" id="toast">已复制，请去MT管理器搜索定位</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const resultsArea = document.getElementById('resultsArea');
    const duplicateList = document.getElementById('duplicateList');
    const toast = document.getElementById('toast');

    fileInput.addEventListener('change', async (event) => {
        const files = event.target.files;
        if (files.length === 0) return;

        // 初始化 UI
        resultsArea.style.display = 'none';
        duplicateList.innerHTML = '';
        progressContainer.style.display = 'block';
        
        const fileHashes = {}; // 存储 哈希值 -> [文件对象列表]
        const duplicates = []; // 存储发现的重复组

        // 为了防止手机端几百个文件同时读取导致主线程卡死，采用切片/分步处理机制
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            // 更新进度条
            const percent = Math.round(((i + 1) / files.length) * 100);
            progressBar.style.width = percent + '%';
            statusText.innerText = `正在处理: ${i + 1} / ${files.length} (${percent}%)`;

            try {
                // 读取文件内容并计算 SHA-256 哈希值
                const buffer = await file.arrayBuffer();
                const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                if (!fileHashes[hashHex]) {
                    fileHashes[hashHex] = [];
                }
                fileHashes[hashHex].push({
                    name: file.name,
                    path: file.webkitRelativePath || file.name,
                    size: (file.size / 1024).toFixed(2) + ' KB'
                });
            } catch (e) {
                console.error("文件读取失败:", file.name);
            }

            // 关键优化：每处理 5 个文件，主动让出一下主线程，防止手机浏览器卡死
            if (i % 5 === 0) {
                await new Promise(resolve => setTimeout(resolve, 0));
            }
        }

        statusText.innerText = "比对完成，正在生成报告...";

        // 筛选出重复的文件组
        for (const hash in fileHashes) {
            if (fileHashes[hash].length > 1) {
                duplicates.push(fileHashes[hash]);
            }
        }

        renderResults(duplicates, files.length);
    });

    // 弹窗提示函数
    function showToast(msg) {
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // 复制文本到剪贴板
    function copyToClipboard(text) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("已复制，去MT管理器粘贴搜索即可定位");
    }

    function renderResults(duplicates, totalFiles) {
        progressContainer.style.display = 'none';
        resultsArea.style.display = 'block';

        if (duplicates.length === 0) {
            duplicateList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">太棒了！没有发现重复文件。</p>';
            return;
        }

        let html = `<p style="font-size: 14px; margin-bottom: 16px; color: var(--text-secondary);">共扫描 ${totalFiles} 个文件，发现 ${duplicates.length} 组内容完全相同的重复文件：</p>`;

        duplicates.forEach((group, index) => {
            html += `<div class="duplicate-group">
                        <h3>重复组 ${index + 1} (内容完全一致)</h3>`;
            group.forEach(file => {
                // 安全转义路径和名称中的特殊字符，防止 JS 拼接报错
                const safePath = file.path.replace(/'/g, "\\'");
                const safeName = file.name.replace(/'/g, "\\'");

                html += `<div class="file-item">
                            <div class="file-info">${file.path} <span style="color:#86868B; font-size:12px; margin-left:5px;">(${file.size})</span></div>
                            <div class="action-bar">
                                <button class="action-link" onclick="copyToClipboard('${safePath}')">🔍 复制相对路径</button>
                                <button class="action-link" onclick="copyToClipboard('${safeName}')">📋 仅复制文件名</button>
                            </div>
                         </div>`;
            });
            html += `</div>`;
        });

        duplicateList.innerHTML = html;
        fileInput.value = ''; // 清空 input
    }
</script>

</body>
</html>
