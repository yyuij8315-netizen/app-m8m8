<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moli's Workspace</title>
    <style>
        :root {
            --bg-color: #f5f6f8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #f5f6f8 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            text-align: center;
            margin: 40px 0 30px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        @media (max-width: 600px) {
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header {
                margin: 20px 0 24px;
            }
        }

        .nav-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            border-radius: 18px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
        }

        @media (hover: hover) {
            .nav-card:hover {
                transform: translateY(-2px);
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 10px 32px rgba(0, 0, 0, 0.05);
                border: 0.5px solid rgba(0, 0, 0, 0.08);
            }
        }

        .nav-card:active {
            transform: scale(0.98);
        }

        .icon-box {
            font-size: 24px;
            margin-right: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: 12px;
            border: 0.5px solid rgba(0,0,0,0.03);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .text-box {
            text-align: left;
            flex: 1;
        }

        .title {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .desc {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.3;
        }
    </style>
<link rel="manifest" href="./manifest.json"><script>navigator.serviceWorker.register('./sw.js')</script></head>
<body>

    <div class="header">

        <p>System Dashboard</p>
    </div>

    <div class="nav-grid">
        
        <!-- 卡片：自动部署 -->

            <div class="text-box">

            </div>

        <!-- 卡片：小星星2 -->
        <a href="./小星星2.html" class="nav-card">

            <div class="text-box">
                <span class="title">星星打卡 (V2)</span>
                <span class="desc">日常习惯追踪与卡牌收集奖励</span>
            </div>
        </a>

        <!-- 卡片：小太阳10 -->
        <a href="./小太阳10.html" class="nav-card">
            <div class="icon-box">☀️</div>
            <div class="text-box">
                <span class="title">小太阳收集 (V10)</span>
                <span class="desc">积分获取与结算中心</span>
            </div>
        </a>

        <!-- 卡片：角色卡改名 -->
        <a href="./角色卡改名.html" class="nav-card">
            <div class="icon-box">🎭</div>
            <div class="text-box">

        <!-- 卡片：api管理 -->
        <a href="./api管理.html" class="nav-card">

                <span class="title">API 管理</span>

        <!-- 卡片：文件1 -->
        <a href="./1.html" class="nav-card">
            <div class="icon-box">📁</div>
            <div class="text-box">
                <span class="title">项目 1</span>
                <span class="desc">开发测试页面 / Component 1</span>
            </div>
        </a>

        <!-- 卡片：文件2 -->
        <a href="./2.html" class="nav-card">
            <div class="icon-box">📁</div>
            <div class="text-box">
                <span class="title">项目 2</span>
                <span class="desc">开发测试页面 / Component 2</span>
            </div>
        </a>

        <!-- 卡片：WI-.md (这是一个Markdown文件，点击后可能会在浏览器中作为纯文本打开) -->
        <a href="./WI-.md" class="nav-card">
            <div class="icon-box">📝</div>
            <div class="text-box">
                <span class="title">世界观设定文档</span>
                <span class="desc">WI-.md (Markdown 文本)</span>
            </div>
        </a>

    </div>

</body>
</html>
